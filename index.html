<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Student Management System</h2>
    
    <form id="studentForm">
        <input type="hidden" id="studentId">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="text" id="course" placeholder="Course" required>
        <button type="submit" id="saveBtn">Save</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTableBody">
            </tbody>
    </table>

<script>
    const API_URL = 'http://localhost:3000/api/students';

    // READ: Display data retrieved from MySQL
    async function fetchStudents() {
        const response = await fetch(API_URL);
        const students = await response.json();
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = '';

        students.forEach(student => {
            tbody.innerHTML += `
                <tr>
                    <td>${student.id}</td>
                    <td>${student.name}</td>
                    <td>${student.email}</td>
                    <td>${student.course}</td>
                    <td>
                        <button class="edit-btn" onclick="editStudent(${student.id}, '${student.name}', '${student.email}', '${student.course}')">Edit</button>
                        <button class="delete-btn" onclick="deleteStudent(${student.id})">Delete</button>
                    </td>
                </tr>
            `;
        });
    }

    // CREATE & UPDATE: Submit data to MySQL
    document.getElementById('studentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('studentId').value;
        const studentData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            course: document.getElementById('course').value
        };

        if (id) {
            // Update functionality
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(studentData)
            });
        } else {
            // Create functionality
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(studentData)
            });
        }

        // Reset form UI
        document.getElementById('studentForm').reset();
        document.getElementById('studentId').value = '';
        document.getElementById('saveBtn').innerText = 'Save';
        fetchStudents(); 
    });

    // Populate the form when Edit is clicked
    function editStudent(id, name, email, course) {
        document.getElementById('studentId').value = id;
        document.getElementById('name').value = name;
        document.getElementById('email').value = email;
        document.getElementById('course').value = course;
        
        // Change button text so the user knows they are editing
        document.getElementById('saveBtn').innerText = 'Update Student'; 
    }

    // DELETE: Delete record from MySQL
    async function deleteStudent(id) {
        if (confirm('Are you sure you want to delete this student?')) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            fetchStudents(); 
        }
    }

    // Load data automatically when the page opens
    window.onload = fetchStudents;
</script>

</body>
</html>
